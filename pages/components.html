/* ── Showcase helpers ─────────────────────────────────────── */

function Stage({ title, description, children }) {
  return (
    <div style={{ marginBottom: Space[16] }}>
      <div style={{ marginBottom: Space[6] }}>
        <h2 style={{ ...Type.headingLg, margin: 0, color: Color.text }}>{title}</h2>
        {description && <p style={{ ...Type.bodyMd, color: Color.mute, marginTop: Space[2], marginBottom: 0 }}>{description}</p>}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: Space[6] }}>
        {children}
      </div>
    </div>
  );
}

function StateRow({ label, children }) {
  return (
    <div>
      <div style={{ ...Type.labelSm, color: Color.mute, marginBottom: Space[3] }}>{label}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: Space[3], alignItems: 'center' }}>
        {children}
      </div>
    </div>
  );
}

function Grid({ columns = 3, gap = Space[4], children }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${columns}, 1fr)`, gap }}>
      {children}
    </div>
  );
}

function ScreenGallery() {
  const [expanded, setExpanded] = React.useState(null);
  const scale = 0.38;

  return (
    <div>
      {/* Expanded overlay */}
      {expanded && (() => {
        const s = DEMO_SCREENS.find(d => d.id === expanded);
        const Cmp = s && s.C();
        if (!Cmp) return null;
        return (
          <div
            onClick={() => setExpanded(null)}
            style={{
              position: 'fixed', inset: 0, zIndex: 1000,
              background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(8px)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexDirection: 'column', gap: 16, cursor: 'pointer',
            }}>
            <div onClick={e => e.stopPropagation()} style={{ cursor: 'default' }}>
              <Phone statusTime="9:41"><Cmp /></Phone>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ ...Type.labelMd, color: Color.accent }}>{s.feature.toUpperCase()}</span>
              <span style={{ ...Type.bodyMd, color: Color.dim }}>{s.label}</span>
            </div>
            <span style={{ ...Type.dataSm, color: Color.faint }}>Click outside to close</span>
          </div>
        );
      })()}

      {/* Thumbnail grid */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))',
        gap: Space[5],
      }}>
        {DEMO_SCREENS.map(s => {
          const Cmp = s.C();
          if (!Cmp) return (
            <div key={s.id} style={{
              borderRadius: Radius.lg, border: `1px solid ${Color.borderSoft}`,
              padding: Space[5], textAlign: 'center',
            }}>
              <div style={{ ...Type.labelSm, color: Color.faint }}>NOT LOADED</div>
              <div style={{ ...Type.dataSm, color: Color.mute, marginTop: 4 }}>{s.label}</div>
            </div>
          );
          return (
            <div key={s.id}
              onClick={() => setExpanded(s.id)}
              style={{
                cursor: 'pointer', borderRadius: Radius.lg,
                border: `1px solid ${Color.borderSoft}`,
                overflow: 'hidden', transition: `border-color ${Duration.normal} ${Ease.default}, transform ${Duration.fast} ${Ease.default}`,
                display: 'flex', flexDirection: 'column',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = Color.accent; e.currentTarget.style.transform = 'translateY(-2px)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = Color.borderSoft; e.currentTarget.style.transform = 'translateY(0)'; }}
            >
              <div style={{
                height: 280, overflow: 'hidden', position: 'relative',
                display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
                background: '#000',
              }}>
                <div style={{
                  transform: `scale(${scale})`, transformOrigin: 'top center',
                  pointerEvents: 'none', width: 402,
                  position: 'absolute', top: 0,
                }}>
                  <Phone statusTime="9:41"><Cmp /></Phone>
                </div>
              </div>
              <div style={{ padding: `${Space[3]}px ${Space[4]}px`, background: Color.surface }}>
                <div style={{ ...Type.labelSm, color: Color.accent, marginBottom: 2 }}>{s.feature.toUpperCase()}</div>
                <div style={{ ...Type.bodySm, color: Color.dim }}>{s.label}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StaggerDemo() {
  const [key, setKey] = React.useState(0);
  return (
    <div>
      <Button variant="secondary" size="sm" onClick={() => setKey(k => k + 1)} style={{ marginBottom: Space[4] }}>
        Replay Animation
      </Button>
      <div key={key} style={{ display: 'flex', flexDirection: 'column', gap: Space[2] }}>
        <FStagger delay={60}>
          <div style={{ padding: '12px 16px', background: F.surface, borderRadius: 8, border: `1px solid ${F.border}` }}>
            <FMono color={F.accent}>01</FMono> <FMono>First item fades in</FMono>
          </div>
          <div style={{ padding: '12px 16px', background: F.surface, borderRadius: 8, border: `1px solid ${F.border}` }}>
            <FMono color={F.accent}>02</FMono> <FMono>Second item follows</FMono>
          </div>
          <div style={{ padding: '12px 16px', background: F.surface, borderRadius: 8, border: `1px solid ${F.border}` }}>
            <FMono color={F.accent}>03</FMono> <FMono>Third item last</FMono>
          </div>
        </FStagger>
      </div>
    </div>
  );
}

      {/* ── F12. FJewel ── */}
      <Stage title="FJewel" description="Iridescent hero button — conic-gradient ring + glow. Used sparingly for primary actions.">
        <StateRow label="With Label">
          <FJewel glyph="M12 5v14 M5 12h14">Start Session</FJewel>
        </StateRow>
        <StateRow label="Icon Only">
          <FJewel glyph="M5 3l14 9-14 9V3z" />
        </StateRow>
        <StateRow label="Compact">
          <FJewel glyph="M12 5v14 M5 12h14" compact />
        </StateRow>
      </Stage>

      {/* ── F13. FPulseBtn ── */}
      <Stage title="FPulseBtn" description="Pulsing action button — animated ring radiates outward.">
        <StateRow label="Default">
          <FPulseBtn />
        </StateRow>
        <StateRow label="Sizes">
          <FPulseBtn size={36} />
          <FPulseBtn size={44} />
          <FPulseBtn size={56} />
        </StateRow>
        <StateRow label="Custom Icon">
          <FPulseBtn icon={ICONS.timer} size={48} />
          <FPulseBtn icon={ICONS.flame} size={48} />
        </StateRow>
      </Stage>

      {/* ── F14. FLabel + FMono ── */}
      <Stage title="FLabel / FMono" description="Typography helpers — mono uppercase labels and inline values.">
        <div style={{ display: 'flex', flexDirection: 'column', gap: Space[3] }}>
          <FLabel>Default Label</FLabel>
          <FLabel color={F.accent}>Accent Label</FLabel>
          <FLabel size={12}>Large Label</FLabel>
          <div style={{ display: 'flex', gap: Space[4], alignItems: 'center' }}>
            <FMono>147g</FMono>
            <FMono color={F.accent}>2,420 kcal</FMono>
            <FMono color={F.mute} size={10}>updated 2m ago</FMono>
          </div>
        </div>
      </Stage>

      {/* ── F15. FIcon + Icon Set ── */}
      <Stage title="FIcon / ICONS" description="Inline SVG icon helper + the full icon set.">
        <StateRow label="Sizes">
          <FIcon path={ICONS.flame} size={14} />
          <FIcon path={ICONS.flame} size={18} />
          <FIcon path={ICONS.flame} size={24} />
          <FIcon path={ICONS.flame} size={32} color={F.accent} />
        </StateRow>
        <StateRow label="Full Icon Set">
          {Object.entries(ICONS).map(([name, path]) => (
            <div key={name} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, width: 52 }}>
              <FIcon path={path} size={20} color={F.dim} />
              <span style={{ fontFamily: FF.mono, fontSize: 8, color: F.mute, letterSpacing: 0.5 }}>{name}</span>
            </div>
          ))}
        </StateRow>
      </Stage>

      {/* ── F16. Cook Icons ── */}
      <Stage title="COOK_ICONS" description="Step-representative cooking icons — designed for kitchen actions.">
        <StateRow label="Full Cook Icon Set">
          {Object.entries(COOK_ICONS).map(([name, path]) => (
            <div key={name} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, width: 52 }}>
              <FIcon path={path} size={20} color={F.dim} />
              <span style={{ fontFamily: FF.mono, fontSize: 8, color: F.mute, letterSpacing: 0.5 }}>{name}</span>
            </div>
          ))}
        </StateRow>
      </Stage>

      {/* ── F17. Phone Shell ── */}
      <Stage title="Phone" description="Device shell for in-context previews — status bar, dynamic island, home indicator.">
        <div style={{ display: 'flex', justifyContent: 'center' }}>
          <div style={{ transform: 'scale(0.55)', transformOrigin: 'top center' }}>
            <Phone statusTime="9:41">
              <FNavBar
                leading={<FIconBtn icon={ICONS.back} size={32} />}
                title="DEMO SCREEN"
                trailing={<FIconBtn icon={ICONS.more} size={32} />}
              />
              <div style={{ flex: 1, padding: '0 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>
                <FSection label="DAILY INTAKE">
                  <FNum size={40} unit="KCAL">1,940</FNum>
                </FSection>
                <FSection label="MACROS">
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    <div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <FLabel mb={0}>Protein</FLabel>
                        <FMono size={10} color={F.accent}>147 / 170g</FMono>
                      </div>
                      <FTexBar pct={86} height={14} />
                    </div>
                    <div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <FLabel mb={0}>Carbs</FLabel>
                        <FMono size={10} color={F.dim}>160 / 260g</FMono>
                      </div>
                      <FTexBar pct={62} height={14} color={F.dim} />
                    </div>
                    <div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <FLabel mb={0}>Fat</FLabel>
                        <FMono size={10} color={F.dim}>60 / 75g</FMono>
                      </div>
                      <FTexBar pct={80} height={14} color={F.dim} />
                    </div>
                  </div>
                </FSection>
                <FBtn variant="primary" full iconLeading={ICONS.plus}>Log Meal</FBtn>
              </div>
              <FTabBar active={2} />
            </Phone>
          </div>
        </div>
      </Stage>

      {/* ── F18. FStagger ── */}
      <Stage title="FStagger" description="Staggered entrance animation — wraps children with per-item fade-in.">
        <div style={{ maxWidth: 420 }}>
          <StaggerDemo />
        </div>
      </Stage>

      <Divider label="DEMO SCREENS" />

      <ScreenGallery />

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ComponentShowcase />);
</script>
</body>
</html>
