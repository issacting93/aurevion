<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurevion · App Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700&family=Geist+Mono:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111111;
            --border: rgba(255, 255, 255, 0.08);
            --text: #fafafa;
            --dim: #a1a1a1;
            --accent: #FF6E50;
            --accent-hover: #ff8a73;
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Geist", -apple-system, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 110, 80, 0.08), transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        header {
            margin-bottom: 60px;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #c93b1d);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
            font-weight: 800;
            color: #1a0f0a;
            box-shadow: 0 10px 40px rgba(201, 59, 29, 0.3);
        }

        h1 {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0;
        }

        p {
            color: var(--dim);
            font-size: 18px;
            font-weight: 300;
            margin: 12px 0 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            background: rgba(255, 110, 80, 0.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card svg {
            color: var(--accent);
        }

        .card h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
        }

        .card span {
            font-size: 13px;
            color: var(--dim);
            font-family: "Geist Mono", monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: "Geist Mono", monospace;
            font-size: 11px;
            color: var(--dim);
            background: rgba(255,255,255,0.03);
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
        }

        .pulse {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Motion: page entrance */
        body {
            opacity: 0;
        }
    </style>
    <script src="/src/system/motion.jsx"></script>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <header>
            <div class="logo">A</div>
            <h1>Aurevion</h1>
            <p>Design System & Interactive Demo</p>
        </header>

        <div class="grid" data-motion="stagger-in">
            <a href="/pages/app" class="card" style="border-color: var(--accent); background: rgba(255, 110, 80, 0.03);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><path d="M12 18h.01"></path><path d="M9 6h6"></path></svg>
                <div>
                    <h2>Interactive Prototype</h2>
                    <span>Working Navigation</span>
                </div>
            </a>
            <a href="/pages/demo" class="card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                <div>
                    <h2>Presentation Demo</h2>
                    <span>Linear Flow</span>
                </div>
            </a>
            <a href="/pages/audit" class="card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <div>
                    <h2>Component Audit</h2>
                    <span>Library Progress</span>
                </div>
            </a>
            <a href="/pages/features" class="card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <div>
                    <h2>Feature Specs</h2>
                    <span>Detail Views</span>
                </div>
            </a>
            <a href="/pages/components" class="card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                <div>
                    <h2>UI Library</h2>
                    <span>Tokens & Parts</span>
                </div>
            </a>
            <a href="/pages/screens" class="card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                <div>
                    <h2>All Screens</h2>
                    <span>Full Flow Overview</span>
                </div>
            </a>
        </div>
    </div>

    <div class="status">
        <div class="pulse"></div>
        SERVER RUNNING ON PORT 3000
    </div>
</body>
</html>
