<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AUREVI0N · New Features</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700&family=Geist+Mono:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%;
    font-family: "Geist", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../src/system/motion.jsx"></script>
<script type="text/babel" src="../src/features/design-canvas.jsx"></script>
<script type="text/babel" src="../src/features/shared.jsx"></script>
<script type="text/babel" src="../src/features/01-goal-setting.jsx"></script>
<script type="text/babel" src="../src/features/02-tdee.jsx"></script>
<script type="text/babel" src="../src/features/03-macros.jsx"></script>
<script type="text/babel" src="../src/features/04-fridge.jsx"></script>
<script type="text/babel" src="../src/features/cook-icons.jsx"></script>
<script type="text/babel" src="../src/features/05-meal-prep.jsx"></script>
<script type="text/babel" src="../src/features/06-plan-calendar.jsx"></script>

<script type="text/babel">
function FeaturesCanvas() {
  return (
    <DesignCanvas title="AUREVI0N · New Features" subtitle="Onboarding · TDEE · Macros · Fridge · Meal Prep">

      <DCSection id="goal-setting" title="01 · Goal Setting" subtitle="Onboarding as a contract, not a form.">
        <DCArtboard id="goal-input"    label="A · Set the goal"     width={420} height={892}><GoalInputScreen/></DCArtboard>
        <DCArtboard id="goal-contract" label="B · The brief"        width={420} height={892}><GoalContractScreen/></DCArtboard>
      </DCSection>

      <DCSection id="tdee" title="02 · TDEE Model" subtitle="A living graph. Uncertainty visible, narrowing with use.">
        <DCArtboard id="tdee-today"    label="A · Today"            width={420} height={892}><TDEEScreen/></DCArtboard>
        <DCArtboard id="tdee-compare"  label="B · Trust over time"  width={420} height={892}><TDEECompareScreen/></DCArtboard>
      </DCSection>

      <DCSection id="plan-calendar" title="03 · Plan Calendar" subtitle="The hub — month / week / day views, switchable inline.">
        <DCArtboard id="plan-cal" label="A · Calendar hub" width={420} height={892}><PlanCalendarHubScreen/></DCArtboard>
      </DCSection>

      <DCSection id="macros" title="04 · Macro Tracking" subtitle="Set once weekly. Plan → meals → shopping. Daily view is just checking off.">
        <DCArtboard id="macro-targets" label="A · Weekly targets"   width={420} height={892}><MacroTargetsScreen/></DCArtboard>
        <DCArtboard id="macro-meals"   label="B · Meal queue"       width={420} height={892}><MacroMealsScreen/></DCArtboard>
        <DCArtboard id="macro-cart"    label="C · Shopping delta"   width={420} height={892}><ShoppingListScreen/></DCArtboard>
      </DCSection>

      <DCSection id="fridge" title="05 · Fridge Tracker" subtitle="A list. The value is the delta — what you have vs. what you need.">
        <DCArtboard id="fridge-list"   label="A · Pantry · delta"   width={420} height={892}><FridgeScreen/></DCArtboard>
      </DCSection>

      <DCSection id="meal-prep" title="06 · Meal Prep" subtitle="A kitchen is a parallel process — the UI should reflect that.">
        <DCArtboard id="prep-merge"    label="A · Pre-cook merge"   width={420} height={892}><MealPrepMergeScreen/></DCArtboard>
        <DCArtboard id="prep-timeline" label="B · Parallel timeline"width={420} height={892}><MealPrepTimelineScreen/></DCArtboard>
        <DCArtboard id="prep-cook"     label="C · Active cook mode" width={420} height={892}><MealPrepCookModeScreen/></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FeaturesCanvas/>);
</script>
</body>
</html>
